name: Monthly Image Refresh

on:
  schedule:
    # Runs at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Monthly Refresh
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PEXELS_KEYS: ${{ secrets.PEXELS_KEYS }}
          GOOGLE_AI_KEYS: ${{ secrets.GOOGLE_AI_KEYS }}
        run: npx tsx scripts/monthly-refresh.ts
        
      - name: Notify on success
        if: success()
        run: echo "✅ Monthly refresh completed"
        
      - name: Notify on failure
        if: failure()
        run: echo "❌ Monthly refresh failed"
